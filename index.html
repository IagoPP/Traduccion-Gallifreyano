<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallifreyan Portal</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #0a0f2a 0%, #000 70%);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.container {
    position: relative;
    z-index: 2;
    top: 40vh;
}

button {
    background: #1f3cff;
    border: none;
    padding: 18px 30px;
    font-size: 18px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px #1f3cff;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 35px #3f5cff;
}

/* Animated Circular Background */
.circle {
    position: absolute;
    border: 2px solid rgba(100,150,255,0.4);
    border-radius: 50%;
    animation: rotate linear infinite;
}

.circle:nth-child(1) {
    width: 300px;
    height: 300px;
    top: 50%;
    left: 50%;
    margin-left: -150px;
    margin-top: -150px;
    animation-duration: 30s;
}

.circle:nth-child(2) {
    width: 450px;
    height: 450px;
    top: 50%;
    left: 50%;
    margin-left: -225px;
    margin-top: -225px;
    animation-duration: 60s;
    animation-direction: reverse;
}

.circle:nth-child(3) {
    width: 600px;
    height: 600px;
    top: 50%;
    left: 50%;
    margin-left: -300px;
    margin-top: -300px;
    animation-duration: 120s;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">
    <h2>Portal de traducción a Alto Gallifreyano</h2>
    <p>Pulsa el botón de abajo y pega en el traductor la frase que se te copiará en el portapapeles</p>
    <button onclick="activate()">Traducir!</button>
</div>

<script>
// Phrase stored encoded (Base64)
const encoded = "SG9ub3IgdGVuaWFuIGxvcyBxdWUgbXVyaWVyb24gYXllcg==";

// Decode only when needed
function getPhrase() {
    return atob(encoded);
}

async function activate() {
    const phrase = getPhrase();

    try {
        await navigator.clipboard.writeText(phrase);
    } catch (err) {
        const temp = document.createElement("textarea");
        temp.value = phrase;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
    }

    // Open in same tab to avoid popup blocking
    window.location.href = "https://www.doctorwho.tv/gallifreyan-translator";
}
</script>

</body>
</html>
