<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallifreyan Translator Redirect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background-color: #0f0f1a;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20% 10%;
    }
    button {
        background-color: #1f3cff;
        color: white;
        border: none;
        padding: 18px 28px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 10px;
        width: 100%;
        max-width: 300px;
    }
    button:active {
        background-color: #3f5cff;
    }
    textarea {
        margin-top: 20px;
        width: 100%;
        max-width: 400px;
        height: 80px;
        font-size: 16px;
    }
</style>
</head>
<body>

<h2>Translate into Gallifreyan</h2>
<p>Tap the button below. Your phrase will copy automatically.</p>

<button onclick="copyAndOpen()">Copy & Open Translator</button>

<textarea id="fallbackText" readonly>
Honor tenian los que murieron ayer
</textarea>

<script>
const phrase = "Honor tenian los que murieron ayer";

async function copyAndOpen() {
    try {
        await navigator.clipboard.writeText(phrase);
        alert("Phrase copied! Paste it in the translator.");
    } catch (err) {
        // Fallback for older/mobile browsers
        const textArea = document.getElementById("fallbackText");
        textArea.select();
        document.execCommand("copy");
        alert("Phrase selected. Tap copy if it didn't copy automatically.");
    }

    window.open("https://www.doctorwho.tv/gallifreyan-translator", "_blank");
}
</script>

</body>
</html>
