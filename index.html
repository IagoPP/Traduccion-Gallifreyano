<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallifreyan Translator Redirect</title>
<style>
    body {
        background-color: #0f0f1a;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 15%;
    }
    button {
        background-color: #1f3cff;
        color: white;
        border: none;
        padding: 15px 25px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 8px;
    }
    button:hover {
        background-color: #3f5cff;
    }
</style>
</head>
<body>

<h1>Gallifreyan Translation Ready</h1>
<p>Your phrase has been copied to your clipboard.</p>
<p>Click below, then paste (Ctrl+V) into the translator.</p>

<button onclick="goToTranslator()">Open Translator</button>

<script>
const phrase = "Honor tenian los que murieron ayer";

async function copyText() {
    try {
        await navigator.clipboard.writeText(phrase);
        console.log("Copied to clipboard");
    } catch (err) {
        console.log("Clipboard copy failed", err);
    }
}

function goToTranslator() {
    window.open("https://www.doctorwho.tv/gallifreyan-translator", "_blank");
}

copyText();
</script>

</body>
</html>
